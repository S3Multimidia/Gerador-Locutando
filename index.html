    <style>
      body {
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Custom focus rings for better accessibility and design */
      .focus-ring {
        --tw-ring-opacity: 1;
        --tw-ring-color: rgb(248 113 113 / var(--tw-ring-opacity)); /* focus:ring-red-400 */
      }
      .focus-ring:focus {
        outline: 2px solid transparent;
        outline-offset: 2px;
        --tw-ring-offset-shadow: var(--tw-ring-inset) 0 0 0 var(--tw-ring-offset-width) var(--tw-ring-offset-color);
        --tw-ring-shadow: var(--tw-ring-inset) 0 0 0 calc(2px + var(--tw-ring-offset-width)) var(--tw-ring-color);
        box-shadow: var(--tw-ring-offset-shadow), var(--tw-ring-shadow), var(--tw-shadow, 0 0 #0000);
      }
      
      /* Custom scrollbar for better aesthetics */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f9fafb; /* bg-gray-50 */
      }
      ::-webkit-scrollbar-thumb {
        background: #d1d5db; /* bg-gray-300 */
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #9ca3af; /* bg-gray-400 */
      }
      
      /* Animation for elements fading in */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.5s ease-out forwards;
      }

      /* Animation for progress bar shimmer */
      @keyframes shimmer {
        0% { background-position: -1000px 0; }
        100% { background-position: 1000px 0; }
      }
      .animate-shimmer {
        animation: shimmer 2.5s infinite linear;
        background: linear-gradient(to right, rgb(239 68 68) 40%, rgb(248 113 113) 50%, rgb(239 68 68) 60%); /* red-500 to red-400 to red-500 */
        background-size: 1000px 100%;
      }
    </style>
